# ✅ Nginx como reverse proxy — oculta el backend, fuerza HTTPS y aplica security headers

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ─── Logging ──────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  # ✅ Oculta la versión de Nginx en headers
  server_tokens off;

  # ─── Limite de tamaño de body (anti DoS / billing bomb) ──────────────────────
  client_max_body_size 1m;

  # ─── Gzip ─────────────────────────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;

  # ─── Redirige todo HTTP → HTTPS ───────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ─── Servidor principal HTTPS ─────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name tallertohan.com www.tallertohan.com;

    # ─── Certificados SSL (Let's Encrypt via Certbot) ─────────────────────────
    ssl_certificate     /etc/letsencrypt/live/tallertohan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tallertohan.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Security Headers ─────────────────────────────────────────────────────
    # ✅ Conjunto completo de headers de seguridad HTTP
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

    # ─── Proxy a la API del backend ───────────────────────────────────────────
    location /api/ {
      proxy_pass         http://backend:3001;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
      proxy_send_timeout 30s;
    }

    # ─── Sirve el frontend estático ───────────────────────────────────────────
    location / {
      proxy_pass http://frontend:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      # SPA fallback: todo 404 va al index.html para react-router
      proxy_intercept_errors on;
      error_page 404 = /index.html;
    }
  }
}
